<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IBI Staff Attendance</title>
    
    <link rel="icon" href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='black'/%3E%3Ctext x='50%25' y='50%25' font-family='Arial, sans-serif' font-size='26' font-weight='bold' fill='%2300c5ff' dominant-baseline='central' text-anchor='middle'%3EIBI%3C/text%3E%3C/svg%3E" type="image/svg+xml">

    <style>
        :root {
            --bg: #f4f5f7;
            --surface: #ffffff;
            --text: #172b4d;
            --border: #dfe1e6;
            --in-btn: #10b981;
            --in-btn-active: #059669;
            --out-btn: #ef4444;
            --out-btn-active: #dc2626;
            --gps-bg: #e2e8f0;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --border: #334155;
            --in-btn: #059669;
            --in-btn-active: #047857;
            --out-btn: #dc2626;
            --out-btn-active: #b91c1c;
            --gps-bg: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .header {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .theme-toggle {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .card {
            background-color: var(--surface);
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            padding: 30px 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            box-sizing: border-box;
            text-align: center;
            transition: background-color 0.3s;
        }

        .company-logo {
            max-width: 100%; 
            height: auto;
            margin: 0 auto 20px auto;
            display: block;
            border-radius: 8px;
        }

        h2 { margin-top: 0; margin-bottom: 24px; }

        .form-group { text-align: left; margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
            opacity: 0.8;
        }

        select {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            border-radius: 8px;
            border: 2px solid var(--border);
            background-color: var(--bg);
            color: var(--text);
            font-weight: bold;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus { border-color: #3b82f6; }

        .gps-display {
            background-color: var(--gps-bg);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            font-weight: bold;
            display: block; 
            border: 1px solid var(--border);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        button.punch-btn {
            width: 100%;
            padding: 24px;
            font-size: 22px;
            font-weight: 800;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s, background-color 0.2s, opacity 0.3s;
        }

        button.punch-btn:active { transform: scale(0.96); }
        button.punch-btn:disabled { 
            cursor: not-allowed; 
            opacity: 0.3; 
            box-shadow: none;
            transform: none;
        }

        .btn-in { background-color: var(--in-btn); }
        .btn-in:hover:not(:disabled) { background-color: var(--in-btn-active); }
        
        .btn-out { background-color: var(--out-btn); }
        .btn-out:hover:not(:disabled) { background-color: var(--out-btn-active); }

        #status {
            margin-top: 20px;
            font-weight: bold;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }
        .status-success { background-color: #dcfce7; color: #166534; display: block !important; }
        .status-error { background-color: #fee2e2; color: #991b1b; display: block !important; }
        .status-warning { background-color: #fef08a; color: #854d0e; display: block !important; }

        .reset-link {
            margin-top: 25px;
            font-size: 12px;
            color: var(--text);
            opacity: 0.6;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="header">
        <h3 style="margin:0;">IBI Warehouse</h3>
        <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">🌙 Dark</button>
    </div>

    <div class="card">
        <img src="logo.png" alt="India Business International Logo" class="company-logo">
        
        <h2>Staff Attendance</h2>

        <div class="form-group">
            <label for="staffName">Select Your Profile</label>
            <select id="staffName" onchange="handleProfileSelection()">
                <option value="" disabled selected>-- Choose Name & Designation --</option>
                <option value="S. Aswin">S. Aswin - WareHouse Packaging Manager</option>
                <option value="M. Ajay">M. Ajay - WareHouse Catalogue Manager</option>
            </select>
        </div>

        <div id="gpsBox" class="gps-display">
            📍 <span id="gpsText" style="color: var(--text);">Initializing GPS... Please Allow Location.</span>
        </div>

        <div class="btn-group">
            <button class="punch-btn btn-in" id="inBtn" onclick="submitPunch('IN')" disabled>PUNCH IN 🟢</button>
            <button class="punch-btn btn-out" id="outBtn" onclick="submitPunch('OUT')" disabled>PUNCH OUT 🔴</button>
        </div>

        <div id="status"></div>

        <div class="reset-link" onclick="resetDeviceState()">🔄 Reset Device State</div>
    </div>

    <script>
        // --- 🚨 SYSTEM CONFIGURATION 🚨 ---
        const WAREHOUSE_LAT = 8.202612; 
        const WAREHOUSE_LON = 77.240076; 
        const MAX_DISTANCE_METERS = 50; 
        let autoPunchLock = false; // Prevents overlapping requests
        const scriptURL = 'https://script.google.com/macros/s/AKfycbztj_cU2LtHlHztnFk9wP84pDe8BwLbtzfSoiZfVwT_d5cc4PDjM_qTV9m9LPUxfPbj6Q/exec';
        // -----------------------------------

        const currentTheme = localStorage.getItem('theme') || 'light';
        if (currentTheme === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
            document.getElementById('themeBtn').innerText = '☀️ Light';
        }

        function toggleTheme() {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.body.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                document.getElementById('themeBtn').innerText = '🌙 Dark';
            } else {
                document.body.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                document.getElementById('themeBtn').innerText = '☀️ Light';
            }
        }

        // Saves profile so they don't have to pick it every time
        function handleProfileSelection() {
            const staffName = document.getElementById('staffName').value;
            localStorage.setItem('ibi_saved_profile', staffName);
            checkStaffState();
        }

        function checkStaffState() {
            const staffName = document.getElementById('staffName').value;
            const inBtn = document.getElementById('inBtn');
            const outBtn = document.getElementById('outBtn');
            
            if (!staffName) {
                inBtn.disabled = true;
                outBtn.disabled = true;
                return;
            }

            const lastPunch = localStorage.getItem('ibi_punch_' + staffName);
            
            inBtn.disabled = false;
            outBtn.disabled = false;

            if (lastPunch === 'IN') {
                inBtn.disabled = true;  
            } else if (lastPunch === 'OUT') {
                outBtn.disabled = true; 
            }
        }

        function resetDeviceState() {
            const staffName = document.getElementById('staffName').value;
            if(!staffName) {
                alert("Please select your profile first to reset.");
                return;
            }
            localStorage.removeItem('ibi_punch_' + staffName);
            checkStaffState();
            alert(`Device state reset for ${staffName}. Both buttons are now active.`);
        }

        function speakMessage(text) {
            if ('speechSynthesis' in window) {
                const msg = new SpeechSynthesisUtterance(text);
                msg.rate = 0.9; 
                window.speechSynthesis.speak(msg);
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const radLat1 = lat1 * Math.PI / 180;
            const radLat2 = lat2 * Math.PI / 180;
            const deltaLat = (lat2 - lat1) * Math.PI / 180;
            const deltaLon = (lon2 - lon1) * Math.PI / 180;

            const a = Math.sin(deltaLat / 2) * Math.sin(deltaLat / 2) +
                      Math.cos(radLat1) * Math.cos(radLat2) *
                      Math.sin(deltaLon / 2) * Math.sin(deltaLon / 2);
            
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c; 
        }

        // Universal Auto-Punch Function
        function triggerAutoPunch(staffName, action) {
            autoPunchLock = true; 
            
            if (action === 'IN') {
                speakMessage("Welcome to the warehouse. Automatically punched IN.");
            } else if (action === 'OUT') {
                speakMessage("You forgot to punch OUT button, and I am automatically helping you to Punch OUT");
            }

            const statusDiv = document.getElementById('status');
            statusDiv.className = 'status-warning';
            statusDiv.innerText = `Auto-Detecting Location... Punching ${action} for ${staffName}...`;
            statusDiv.style.display = 'block';

            const formData = new FormData();
            formData.append('staffName', staffName);
            formData.append('action', action);

            fetch(scriptURL, { method: 'POST', body: formData })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        localStorage.setItem('ibi_punch_' + staffName, action);
                        statusDiv.innerText = `Success! Auto PUNCH ${action} recorded.`;
                        statusDiv.className = 'status-success';
                        checkStaffState(); 
                        setTimeout(() => { 
                            statusDiv.style.display = 'none'; 
                            autoPunchLock = false; // Release lock
                        }, 8000);
                    }
                })
                .catch(error => {
                    statusDiv.innerText = `Auto-Punch ${action} failed due to Network error. Please click manually.`;
                    statusDiv.className = 'status-error';
                    autoPunchLock = false; // Release lock
                });
        }

        // Live GPS Tracking & Auto-Punch Evaluator
        function startLiveGPS() {
            const gpsText = document.getElementById('gpsText');
            
            if (!navigator.geolocation) {
                gpsText.innerText = "Error: GPS is not supported on this browser.";
                gpsText.style.color = "red";
                return;
            }

            navigator.geolocation.watchPosition(
                function(position) {
                    const userLat = position.coords.latitude;
                    const userLon = position.coords.longitude;
                    const distance = Math.round(calculateDistance(userLat, userLon, WAREHOUSE_LAT, WAREHOUSE_LON));
                    const staffName = document.getElementById('staffName').value;

                    if (distance <= MAX_DISTANCE_METERS) {
                        gpsText.innerHTML = `On-Site Verified: ${distance}m away 🟢`;
                        gpsText.style.color = "#10b981"; 

                        // AUTO PUNCH IN LOGIC
                        if (staffName && !autoPunchLock) {
                            const lastPunch = localStorage.getItem('ibi_punch_' + staffName);
                            // If they are at the warehouse and currently OUT (or never punched), trigger IN
                            if (lastPunch !== 'IN') {
                                triggerAutoPunch(staffName, 'IN');
                            }
                        }

                    } else {
                        gpsText.innerHTML = `Outside Zone: ${distance}m away 🔴`;
                        gpsText.style.color = "#ef4444"; 

                        // AUTO PUNCH OUT LOGIC
                        if (staffName && !autoPunchLock) {
                            const lastPunch = localStorage.getItem('ibi_punch_' + staffName);
                            // If they are away from warehouse and currently IN, trigger OUT
                            if (lastPunch === 'IN') {
                                triggerAutoPunch(staffName, 'OUT');
                            }
                        }
                    }
                },
                function(error) {
                    let errorMsg = 'Unknown Location Error.';
                    if (error.code === 1) errorMsg = 'Location Access Denied. Please enable it.';
                    if (error.code === 2) errorMsg = 'Searching for GPS signal...';
                    if (error.code === 3) errorMsg = 'Location request timed out.';
                    gpsText.innerText = errorMsg;
                    gpsText.style.color = "#ef4444";
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 5000 }
            );
        }

        // Initialize App on Load
        window.onload = function() {
            // Load saved profile if it exists
            const savedProfile = localStorage.getItem('ibi_saved_profile');
            if (savedProfile) {
                document.getElementById('staffName').value = savedProfile;
                checkStaffState();
            }
            startLiveGPS();
        };

        // Standard Manual Punch (Backup if they want to click it manually)
        function submitPunch(action) {
            const staffName = document.getElementById('staffName').value;
            const statusDiv = document.getElementById('status');
            const inBtn = document.getElementById('inBtn');
            const outBtn = document.getElementById('outBtn');

            inBtn.disabled = true;
            outBtn.disabled = true;
            statusDiv.className = 'status-warning';
            statusDiv.innerText = 'Verifying final location... Please wait.';
            statusDiv.style.display = 'block';

            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const userLat = position.coords.latitude;
                    const userLon = position.coords.longitude;
                    const distance = Math.round(calculateDistance(userLat, userLon, WAREHOUSE_LAT, WAREHOUSE_LON));

                    if (distance > MAX_DISTANCE_METERS) {
                        statusDiv.innerText = `Punch Denied: You are ${distance}m away. Must be within ${MAX_DISTANCE_METERS}m.`;
                        statusDiv.className = 'status-error';
                        checkStaffState(); 
                        return;
                    }

                    statusDiv.className = 'status-warning';
                    statusDiv.innerText = `Location Confirmed. Recording punch...`;

                    const formData = new FormData();
                    formData.append('staffName', staffName);
                    formData.append('action', action);

                    fetch(scriptURL, { method: 'POST', body: formData })
                        .then(response => response.json())
                        .then(data => {
                            if (data.status === 'success') {
                                const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                                statusDiv.innerText = `Success! ${action} recorded for ${staffName} at ${time}.`;
                                statusDiv.className = 'status-success';
                                speakMessage("Thank You, from India Business International");
                                localStorage.setItem('ibi_punch_' + staffName, action);
                            } else {
                                statusDiv.innerText = `Google Error: ${data.message}`;
                                statusDiv.className = 'status-error';
                            }
                            
                            checkStaffState(); 
                            
                            setTimeout(() => { 
                                statusDiv.style.display = 'none'; 
                            }, 8000);
                        })
                        .catch(error => {
                            statusDiv.innerText = 'Network error. Please try again.';
                            statusDiv.className = 'status-error';
                            checkStaffState();
                        });

                },
                function(error) {
                    let errorMsg = 'Unknown Location Error.';
                    if (error.code === 1) errorMsg = 'Punch Denied: You must Allow Location access.';
                    if (error.code === 2) errorMsg = 'Punch Denied: GPS signal lost.';
                    if (error.code === 3) errorMsg = 'Punch Denied: Location request timed out.';
                    
                    statusDiv.innerText = errorMsg;
                    statusDiv.className = 'status-error';
                    checkStaffState();
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }
    </script>

</body>
</html>
